<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Navbar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">


  <nav class="bg-white shadow-md px-6 py-4">

      <div class="text-xl font-bold text-gray-800">
        MyLogo
      </div>

 
      <ul class="hidden md:flex space-x-6 text-gray-700">
        <li><a href="#" class="hover:text-blue-500">Home</a></li>
        <li><a href="#" class="hover:text-blue-500">About</a></li>
        <li><a href="#" class="hover:text-blue-500">Services</a></li>
        <li><a href="#" class="hover:text-blue-500">Contact</a></li>
      </ul>

   
      <div class="md:hidden">
        <button class="text-gray-800 text-2xl">
          ☰
        </button>
      </div>

    </div>

 
    <div class="hidden mt-4 space-y-2 md:hidden">
      <a href="#" class="block text-gray-700">Home</a>
      <a href="#" class="block text-gray-700">About</a>
      <a href="#" class="block text-gray-700">Services</a>
      <a href="#" class="block text-gray-700">Contact</a>
    </div>
  </nav>

</body>
</html>
