<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Column Flex Layout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

  <div class="flex flex-col md:flex-row gap-6">

   
    <div class="md:w-1/2 bg-white p-6 rounded-xl shadow-md">
      <h2 class="text-2xl font-bold text-gray-800 mb-3">
        Left Column
      </h2>
      <p class="text-gray-600">
        This column contains text content. On smaller screens, it stacks on top.
        On medium and larger screens, it takes half the width.
      </p>
    </div>

    <div class="md:w-1/2 bg-white p-6 rounded-xl shadow-md">
      <h2 class="text-2xl font-bold text-gray-800 mb-3">
        Right Column
      </h2>
      <p class="text-gray-600">
        This is the second column. Flexbox utilities control layout direction,
        spacing, and responsiveness without custom CSS.
      </p>
    </div>

  </div>

</body>
</html>
