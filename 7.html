<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Utilities</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-5">

  <div class="container">

    <h2 class="mb-4">Border Utilities Demo</h2>

    <!-- All sides border -->
    <div class="p-3 mb-3 border">
      Default border on all sides
    </div>

    <!-- Thick border -->
    <div class="p-3 mb-3 border border-3">
      Thicker border (border-3)
    </div>

   
    <div class="p-3 mb-3 border border-primary">
      Primary colored border
    </div>

 
    <div class="p-3 mb-3 border-top border-danger">
      Only top border (red)
    </div>

    
    <div class="p-3 mb-3 border-start border-success">
      Only left border (green)
    </div>

    <div class="p-3 mb-3 border border-dark rounded">
      Border with rounded corners
    </div>

  </div>

</body>
</html>
