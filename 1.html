<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Utility Card Layout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">

    <div class="bg-white rounded-xl shadow-md p-6">
      <img src="https://via.placeholder.com/300" alt="Card Image"
           class="rounded-lg mb-4 w-full">
      <h2 class="text-xl font-semibold text-gray-800 mb-2">
        Card Title
      </h2>
      <p class="text-gray-600 mb-4">
        This is a simple card description using only utility classes for styling.
      </p>
      <button class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
        Read More
      </button>
    </div>


    <div class="bg-white rounded-xl shadow-md p-6">
      <img src="https://via.placeholder.com/300" alt="Card Image"
           class="rounded-lg mb-4 w-full">
      <h2 class="text-xl font-semibold text-gray-800 mb-2">
        Another Card
      </h2>
      <p class="text-gray-600 mb-4">
        Utility classes control spacing, colors, and layout without custom CSS.
      </p>
      <button class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
        Explore
      </button>
    </div>


    <div class="bg-white rounded-xl shadow-md p-6">
      <img src="https://via.placeholder.com/300" alt="Card Image"
           class="rounded-lg mb-4 w-full">
      <h2 class="text-xl font-semibold text-gray-800 mb-2">
        Third Card
      </h2>
      <p class="text-gray-600 mb-4">
        Clean, responsive, and easy to scale layouts using utility-first styling.
      </p>
      <button class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600">
        Details
      </button>
    </div>

  </div>

</body>
</html>
