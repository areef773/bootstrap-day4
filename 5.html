<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Boxes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 space-y-4">


  <div class="bg-green-100 text-green-800 p-4 rounded-lg">
    ✅ Success! Your action was completed successfully.
  </div>

 
  <div class="bg-red-100 text-red-800 p-4 rounded-lg">
    ❌ Error! Something went wrong. Please try again.
  </div>

 
  <div class="bg-yellow-100 text-yellow-800 p-4 rounded-lg">
    ⚠️ Warning! Please check your inputs carefully.
  </div>


  <div class="bg-blue-100 text-blue-800 p-4 rounded-lg">
    ℹ️ Info: This is an informational message for the user.
  </div>

</body>
</html>
