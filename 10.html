<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Table</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-5">

  <div class="container">

    <h2 class="text-center mb-5">Pricing Plans</h2>

    <div class="row g-4">

   
      <div class="col-md-4">
        <div class="border rounded p-4 text-center bg-white h-100">
          <h4 class="mb-3">Basic</h4>
          <h2 class="text-primary mb-3">$9</h2>
          <p class="text-muted">Per month</p>

          <ul class="list-unstyled my-4">
            <li class="mb-2">✔ 1 Website</li>
            <li class="mb-2">✔ 10 GB Storage</li>
            <li class="mb-2">✔ Email Support</li>
          </ul>

          <button class="btn btn-outline-primary w-100">
            Choose Plan
          </button>
        </div>
      </div>

   
      <div class="col-md-4">
        <div class="border border-primary rounded p-4 text-center bg-white h-100 shadow">
          <h4 class="mb-3">Standard</h4>
          <h2 class="text-primary mb-3">$29</h2>
          <p class="text-muted">Per month</p>

          <ul class="list-unstyled my-4">
            <li class="mb-2">✔ 5 Websites</li>
            <li class="mb-2">✔ 50 GB Storage</li>
            <li class="mb-2">✔ Priority Support</li>
          </ul>

          <button class="btn btn-primary w-100">
            Choose Plan
          </button>
        </div>
      </div>

      <div class="col-md-4">
        <div class="border rounded p-4 text-center bg-white h-100">
          <h4 class="mb-3">Premium</h4>
          <h2 class="text-primary mb-3">$59</h2>
          <p class="text-muted">Per month</p>

          <ul class="list-unstyled my-4">
            <li class="mb-2">✔ Unlimited Websites</li>
            <li class="mb-2">✔ 200 GB Storage</li>
            <li class="mb-2">✔ 24/7 Support</li>
          </ul>

          <button class="btn btn-outline-primary w-100">
            Choose Plan
          </button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
